embedding:
  model: "BAAI/bge-small-en-v1.5"
  dimension: 384

chunking:
  chunk_size: 512
  chunk_overlap: 50
  separators: ["\n\n", "\n", ".", " "]

retrieval:
  top_k: 5
  cosine_threshold: 0.75
  borderline_lower: 0.50
  rerank_threshold: 0.60

reranker:
  model: "cross-encoder/ms-marco-MiniLM-L-6-v2"

generator:
  model: "google/flan-t5-small"
  max_new_tokens: 256
  temperature: 0.3

pinecone:
  index_name: "rag-knowledge-base"
  metric: "cosine"
  dimension: 384

logging:
  log_file: "logs/query_logs.json"
  max_logs: 1000